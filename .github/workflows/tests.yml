name: Tests & Linting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pylint black

    - name: Lint with pylint
      run: |
        pylint --disable=all --enable=F,E src/core/*.py src/apps/**/*.py --fail-under=8

    - name: Format check with black
      run: |
        black --check src/ --diff

    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml

    - name: Smoke test tickets health
      shell: pwsh
      run: |
        $job = Start-Job -ScriptBlock {
          Set-Location "$using:GITHUB_WORKSPACE"
          python -c "from src.core import servidor_red as s; s.iniciar_servidor(puerto=5566); import time; time.sleep(20)"
        }

        $ok = $false
        for ($i=0; $i -lt 15; $i++) {
          try {
            $r = Invoke-WebRequest -Uri "http://127.0.0.1:5566/health" -UseBasicParsing -TimeoutSec 2
            if ($r.StatusCode -eq 200) { $ok = $true; break }
          } catch {}
          Start-Sleep -Seconds 1
        }

        Stop-Job $job -ErrorAction SilentlyContinue
        Remove-Job $job -ErrorAction SilentlyContinue

        if (-not $ok) {
          throw "Smoke test tickets health falló"
        }

    - name: Smoke test licencias health
      shell: pwsh
      run: |
        $job = Start-Job -ScriptBlock {
          Set-Location "$using:GITHUB_WORKSPACE"
          $env:TICKETS_LICENSE_PORT = "8789"
          python app_licencias.py
        }

        $ok = $false
        for ($i=0; $i -lt 15; $i++) {
          try {
            $r = Invoke-WebRequest -Uri "http://127.0.0.1:8789/health" -UseBasicParsing -TimeoutSec 2
            if ($r.StatusCode -eq 200) { $ok = $true; break }
          } catch {}
          Start-Sleep -Seconds 1
        }

        Stop-Job $job -ErrorAction SilentlyContinue
        Remove-Job $job -ErrorAction SilentlyContinue

        if (-not $ok) {
          throw "Smoke test licencias health falló"
        }

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

