name: Tests & Linting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pylint black pyinstaller

    - name: Lint with pylint
      run: |
        pylint --disable=all --enable=F,E src/core/*.py src/apps/**/*.py --fail-under=8

    - name: Format check with black
      run: |
        black --check src/ --diff

    - name: Run tests
      run: |
        python -m pytest tests/ -v --cov=src.core.startup_guard --cov-report=xml --cov-fail-under=85

    - name: Coverage gate data_access
      run: |
        python -m pytest tests/ -q --cov=core.data_access --cov-report=term-missing --cov-fail-under=38

    - name: Startup smoke entrypoints
      shell: pwsh
      run: |
        $env:TICKETS_SMOKE_STARTUP = "1"
        python kubo.py
        if ($LASTEXITCODE -ne 0) { throw "Smoke kubo falló" }
        python kubito.py
        if ($LASTEXITCODE -ne 0) { throw "Smoke kubito falló" }
        $env:TICKETS_LICENSE_ADMIN_KEY = "test-admin-key-very-strong-123456"
        python app_licencias.py
        if ($LASTEXITCODE -ne 0) { throw "Smoke app_licencias falló" }

    - name: PyInstaller smoke kubo
      shell: pwsh
      run: |
        python -m PyInstaller --noconfirm --clean --onedir --name SmokeKubo --distpath runtime/smoke_dist --workpath runtime/smoke_build --specpath runtime/smoke_spec kubo.py

    - name: Smoke test tickets health
      shell: pwsh
      run: |
        $job = Start-Job -ScriptBlock {
          Set-Location "$using:GITHUB_WORKSPACE"
          python -c "from src.core import servidor_red as s; s.iniciar_servidor(puerto=5566); import time; time.sleep(20)"
        }

        $ok = $false
        for ($i=0; $i -lt 15; $i++) {
          try {
            $r = Invoke-WebRequest -Uri "http://127.0.0.1:5566/health" -UseBasicParsing -TimeoutSec 2
            if ($r.StatusCode -eq 200) { $ok = $true; break }
          } catch {}
          Start-Sleep -Seconds 1
        }

        Stop-Job $job -ErrorAction SilentlyContinue
        Remove-Job $job -ErrorAction SilentlyContinue

        if (-not $ok) {
          throw "Smoke test tickets health falló"
        }

    - name: Smoke test licencias health
      shell: pwsh
      run: |
        $job = Start-Job -ScriptBlock {
          Set-Location "$using:GITHUB_WORKSPACE"
          $env:TICKETS_LICENSE_PORT = "8789"
          python app_licencias.py
        }

        $ok = $false
        for ($i=0; $i -lt 15; $i++) {
          try {
            $r = Invoke-WebRequest -Uri "http://127.0.0.1:8789/health" -UseBasicParsing -TimeoutSec 2
            if ($r.StatusCode -eq 200) { $ok = $true; break }
          } catch {}
          Start-Sleep -Seconds 1
        }

        Stop-Job $job -ErrorAction SilentlyContinue
        Remove-Job $job -ErrorAction SilentlyContinue

        if (-not $ok) {
          throw "Smoke test licencias health falló"
        }

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

